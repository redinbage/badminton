name: Badminton Court Search

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Number of local days to check"
        required: false
        default: "3"
      evening_start:
        description: "Earliest start time to report"
        required: false
        default: "18:00"

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Fame badminton availability
        env:
          DAYS_AHEAD: ${{ github.event.inputs.days_ahead || '3' }}
          EVENING_START: ${{ github.event.inputs.evening_start || '18:00' }}
          TIME_ZONE: Europe/Warsaw
          OUTPUT_DIR: output
        run: npm run search:courts

      - name: Email availability results
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: redinbage@gmail.com
          OUTPUT_DIR: output
        run: python3 scripts/send-email.py

      - name: Upload availability results
        uses: actions/upload-artifact@v4
        with:
          name: fame-badminton-availability
          path: output/
          if-no-files-found: error
